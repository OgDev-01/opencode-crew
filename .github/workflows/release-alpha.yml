# Alpha channel release workflow.
# Triggered on every push to the alpha branch.
# Auto-increments using github.run_number (no version manager needed).
# Always publishes to @alpha dist-tag.
name: release-alpha
run-name: "alpha release"

on:
  push:
    branches: [alpha]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/test-suite

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/typecheck

  publish-alpha:
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.repository == 'OgDev-01/opencode-crew'
    outputs:
      version: ${{ steps.version.outputs.version }}
      dist_tag: "alpha"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Calculate alpha version
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' package.json | cut -d'-' -f1)
          ALPHA_VERSION="${BASE_VERSION}-alpha.${{ github.run_number }}"
          echo "version=$ALPHA_VERSION" >> $GITHUB_OUTPUT
          echo "Alpha version: $ALPHA_VERSION"

      - name: Check if already published
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/@ogdev%2Fopencode-crew/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ @ogdev/opencode-crew@${VERSION} already published"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in package files
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

          for platform in darwin-arm64 darwin-x64 darwin-x64-baseline linux-x64 linux-x64-baseline linux-arm64 linux-x64-musl linux-x64-musl-baseline linux-arm64-musl windows-x64 windows-x64-baseline; do
            jq --arg v "$VERSION" '.version = $v' "packages/${platform}/package.json" > tmp.json
            mv tmp.json "packages/${platform}/package.json"
          done

          jq --arg v "$VERSION" '.optionalDependencies = (.optionalDependencies | to_entries | map(.value = $v) | from_entries)' package.json > tmp.json && mv tmp.json package.json

      - name: Build main package
        if: steps.check.outputs.skip != 'true'
        run: |
          bun build src/index.ts --outdir dist --target bun --format esm --external @ast-grep/napi
          bun build src/cli/index.ts --outdir dist/cli --target bun --format esm --external @ast-grep/napi
          bunx tsc --emitDeclarationOnly
          bun run build:schema

      - name: Publish to @alpha
        if: steps.check.outputs.skip != 'true'
        run: |
          npm publish --access public --provenance --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Git tag (no commit — avoid merge conflicts on alpha branch)
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -f "v${{ steps.version.outputs.version }}"
          git push origin --tags --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-platform:
    runs-on: ubuntu-latest
    needs: publish-alpha
    steps:
      - name: Trigger platform publish workflow
        run: |
          gh workflow run publish-platform.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref }} \
            -f version=${{ needs.publish-alpha.outputs.version }} \
            -f dist_tag=alpha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
