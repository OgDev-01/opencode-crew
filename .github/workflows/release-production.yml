# Manual production promotion workflow.
# Promotes from staging (@next) to production (@latest).
# MANUAL ONLY — no automated triggers. Safety gate ensures version is on @next first.
name: release-production
run-name: "production release ${{ inputs.version || 'from @next' }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g., 1.2.0). Leave empty to use current @next version."
        required: false
        type: string
      skip_platform:
        description: "Skip platform binary packages"
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  verify-staging:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(npm view @ogdev/opencode-crew@next version 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              echo "::error::Could not resolve @next version from npm. Is @next published?"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Verify version is on @next
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          NEXT_VERSION=$(npm view @ogdev/opencode-crew@next version 2>/dev/null || echo "")
          if [ "$VERSION" != "$NEXT_VERSION" ]; then
            echo "::error::Version $VERSION is not the current @next version ($NEXT_VERSION). Publish to @next (staging) first."
            exit 1
          fi
          echo "✓ Version $VERSION confirmed on @next"

      - name: Assert stable version format
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "::error::Version $VERSION is a prerelease version. Only stable versions (x.y.z) can be promoted to @latest."
            exit 1
          fi
          echo "✓ Version $VERSION is a stable release"

  test:
    runs-on: ubuntu-latest
    needs: verify-staging
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-suite

  typecheck:
    runs-on: ubuntu-latest
    needs: verify-staging
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/typecheck

  publish-production:
    runs-on: ubuntu-latest
    needs: [verify-staging, test, typecheck]
    if: github.repository == 'OgDev-01/opencode-crew'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Set version
        id: version
        run: |
          VERSION="${{ needs.verify-staging.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Promoting version: $VERSION"

      - name: Check if already published as @latest
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LATEST=$(npm view @ogdev/opencode-crew@latest version 2>/dev/null || echo "")
          if [ "$LATEST" = "$VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ @ogdev/opencode-crew@${VERSION} already @latest"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

          for platform in darwin-arm64 darwin-x64 darwin-x64-baseline linux-x64 linux-x64-baseline linux-arm64 linux-x64-musl linux-x64-musl-baseline linux-arm64-musl windows-x64 windows-x64-baseline; do
            jq --arg v "$VERSION" '.version = $v' "packages/${platform}/package.json" > tmp.json
            mv tmp.json "packages/${platform}/package.json"
          done

          jq --arg v "$VERSION" '.optionalDependencies = (.optionalDependencies | to_entries | map(.value = $v) | from_entries)' package.json > tmp.json && mv tmp.json package.json

      - name: Build main package
        if: steps.check.outputs.skip != 'true'
        run: |
          bun build src/index.ts --outdir dist --target bun --format esm --external @ast-grep/napi
          bun build src/cli/index.ts --outdir dist/cli --target bun --format esm --external @ast-grep/napi
          bunx tsc --emitDeclarationOnly
          bun run build:schema

      - name: Publish to @latest
        if: steps.check.outputs.skip != 'true'
        run: |
          # Production publishes WITHOUT --tag — npm defaults to @latest for stable versions
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Git commit and tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json assets/opencode-crew.schema.json packages/*/package.json || true
          git diff --cached --quiet || git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag -f "v${{ steps.version.outputs.version }}"
          git push origin --tags --force
          git push origin HEAD || echo "Branch push failed (non-critical)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-platform:
    runs-on: ubuntu-latest
    needs: publish-production
    if: inputs.skip_platform != true
    steps:
      - name: Trigger platform publish workflow
        run: |
          gh workflow run publish-platform.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref }} \
            -f version=${{ needs.publish-production.outputs.version }} \
            -f dist_tag=
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: publish-production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Generate changelog
        run: |
          bun run script/generate-changelog.ts > /tmp/changelog.md
          cat /tmp/changelog.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote GitHub release to latest
        run: |
          VERSION="${{ needs.publish-production.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release edit "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/changelog.md --latest --prerelease=false
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/changelog.md --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
